name: AWS CI CD
on:
  push:
    paths:
      - 'chaekit-spring/**'
    branches:
      - feat/new-docker

permissions:
  id-token: write
  contents: read

jobs:
  # Spring Boot 애플리케이션을 빌드하여 도커허 브에 푸시하는 과정
  build-docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Change directory to chaekit-spring
        run: cd chaekit-spring
        
      # Java 17 세팅
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradlew 권한 설정
      - name: Grant execute permission for gradlew
        run: cd chaekit-spring && chmod +x gradlew

      # Gradle 빌드 엑션을 이용해서 프로젝트 빌드
      - name: Build with Gradle
        run: cd chaekit-spring && ./gradlew build -x test

      # AWS 로그인
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::880996438467:role/allow
          role-session-name: sampleSessionName
          aws-region: ap-northeast-2
